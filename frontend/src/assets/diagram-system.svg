<svg width="1120" height="360" viewBox="0 0 1120 360" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1120" height="360" rx="18" fill="#F8FAFC"/>
  <text x="36" y="44" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">BidForge System Diagram</text>

  <rect x="36" y="88" width="260" height="210" rx="14" fill="#E0F2FE" stroke="#0284C7"/>
  <text x="60" y="126" fill="#0C4A6E" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">Frontend (React + Vite)</text>
  <text x="60" y="154" fill="#0C4A6E" font-family="Inter, Arial, sans-serif" font-size="14">- Landing, Login, Signup</text>
  <text x="60" y="176" fill="#0C4A6E" font-family="Inter, Arial, sans-serif" font-size="14">- Auctions, Metrics, Profile</text>
  <text x="60" y="198" fill="#0C4A6E" font-family="Inter, Arial, sans-serif" font-size="14">- JWT in local storage</text>

  <rect x="430" y="88" width="260" height="210" rx="14" fill="#DCFCE7" stroke="#16A34A"/>
  <text x="454" y="126" fill="#14532D" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">Backend (FastAPI)</text>
  <text x="454" y="154" fill="#14532D" font-family="Inter, Arial, sans-serif" font-size="14">- Auth and role checks</text>
  <text x="454" y="176" fill="#14532D" font-family="Inter, Arial, sans-serif" font-size="14">- RFQ, bids, analytics APIs</text>
  <text x="454" y="198" fill="#14532D" font-family="Inter, Arial, sans-serif" font-size="14">- WebSocket event broadcasting</text>

  <rect x="824" y="88" width="260" height="210" rx="14" fill="#FEF3C7" stroke="#D97706"/>
  <text x="848" y="126" fill="#78350F" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">Data Layer</text>
  <text x="848" y="154" fill="#78350F" font-family="Inter, Arial, sans-serif" font-size="14">- MongoDB collections</text>
  <text x="848" y="176" fill="#78350F" font-family="Inter, Arial, sans-serif" font-size="14">- RFQs and bid history</text>
  <text x="848" y="198" fill="#78350F" font-family="Inter, Arial, sans-serif" font-size="14">- audit, metrics, timeline</text>

  <path d="M296 193H430" stroke="#0284C7" stroke-width="3" marker-end="url(#arrowA)"/>
  <path d="M690 193H824" stroke="#16A34A" stroke-width="3" marker-end="url(#arrowA)"/>

  <defs>
    <marker id="arrowA" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0L10 5L0 10V0Z" fill="#334155"/>
    </marker>
  </defs>
</svg>
